CONFIG_ZMK_KEYBOARD_NAME="MeKaBu"

CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

CONFIG_GPIO=y
